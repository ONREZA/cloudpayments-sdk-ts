name: Sync CloudPayments docs

on:
  schedule:
    # Ежедневно в 03:00 UTC (06:00 МСК).
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Sync docs (scrape → parse → gen)
        id: sync
        run: |
          set +e
          bun run docs:sync
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 100 ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -ne 0 ]; then
            exit $code
          fi

      - name: Extract docs hash
        if: steps.sync.outputs.no_changes != 'true'
        id: meta
        run: |
          sha=$(jq -r '.source.htmlSha256 // "unknown"' specs/ir.json | cut -c1-12)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Verify build still passes
        if: steps.sync.outputs.no_changes != 'true'
        run: |
          bun run lint
          bun run typecheck
          bun run test
          bun run build

      - name: Create Pull Request
        if: steps.sync.outputs.no_changes != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/docs
          title: "chore(ir): sync CloudPayments docs → ${{ steps.meta.outputs.sha }}"
          body-path: .sync-report.md
          commit-message: "chore(ir): sync CloudPayments docs → ${{ steps.meta.outputs.sha }}"
          labels: |
            docs-sync
            autogenerated
          delete-branch: true
